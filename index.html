<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarik Tasci — Gründungsberatung · Webhandwerk · Workshops</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400;1,6..72,500&family=JetBrains+Mono:wght@400;500;600&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #efeae0;
      --paper: #f7f3ea;
      --ink: #1a1812;
      --dim: #6b6256;
      --line: rgba(26, 24, 18, 0.12);
      --accent: #b04a2e;
      --accent-light: #c4533a;
    }

    [data-theme="moss"] {
      --bg: #ece8de;
      --paper: #f5f1e7;
      --ink: #1a1812;
      --dim: #6b6256;
      --line: rgba(26, 24, 18, 0.12);
      --accent: #3a6b46;
      --accent-light: #4a8a5a;
    }

    [data-theme="cobalt"] {
      --bg: #ecedef;
      --paper: #f6f6f5;
      --ink: #161821;
      --dim: #5a5e6e;
      --line: rgba(22, 24, 33, 0.12);
      --accent: #2d4cb8;
      --accent-light: #3d5fd1;
    }

    [data-theme="mono"] {
      --bg: #f4f1ea;
      --paper: #fbf8f1;
      --ink: #1a1812;
      --dim: #6b6256;
      --line: rgba(26, 24, 18, 0.12);
      --accent: #1a1812;
      --accent-light: #3a3530;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Bricolage Grotesque", system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      transition: background 0.4s ease, color 0.4s ease;
    }

    html { scroll-behavior: smooth; }

    /* paper grain — optional, can be toggled */
    body.grain::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      opacity: 0.04;
      mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    @keyframes tt-ticker {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    /* ── Motion ───────────────────────────────────────────────── */
    @keyframes tt-rise {
      from { transform: translateY(110%); }
      to   { transform: translateY(0); }
    }
    @keyframes tt-fade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes tt-pulse {
      0%, 100% { box-shadow: 0 0 0 0 color-mix(in srgb, #7fc97f 65%, transparent); }
      70%      { box-shadow: 0 0 0 10px color-mix(in srgb, #7fc97f 0%, transparent); }
    }
    @keyframes tt-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes tt-word-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tt-mask {
      display: inline-block;
      overflow: hidden;
      vertical-align: top;
      line-height: inherit;
    }
    .tt-rise {
      display: inline-block;
      transform: translateY(110%);
      animation: tt-rise 1s cubic-bezier(.2,.8,.2,1) forwards;
    }
    .tt-pulse-dot {
      animation: tt-pulse 2.2s ease-out infinite;
    }
    .tt-cursor::after {
      content: '_';
      display: inline-block;
      margin-left: 2px;
      animation: tt-blink 1.1s steps(1) infinite;
      color: var(--accent);
    }

    /* Scroll reveal */
    [data-reveal] {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity .9s cubic-bezier(.2,.7,.3,1), transform .9s cubic-bezier(.2,.7,.3,1);
      will-change: opacity, transform;
    }
    [data-reveal][data-revealed="true"] {
      opacity: 1;
      transform: translateY(0);
    }

    /* Scroll progress */
    .tt-progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 2px;
      background: var(--accent);
      z-index: 60;
      width: 0;
      transition: width .12s linear;
    }

    /* Project card arrow that slides in on hover */
    .tt-card-arrow {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity .2s, transform .25s cubic-bezier(.2,.7,.3,1);
    }
    article:hover .tt-card-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* Blog row hover */
    .tt-post-row {
      position: relative;
    }
    .tt-post-row::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: center;
      transition: transform .25s cubic-bezier(.2,.7,.3,1);
    }
    .tt-post-row:hover { padding-left: 36px !important; background: color-mix(in srgb, var(--accent) 4%, transparent); }
    .tt-post-row:hover::before { transform: scaleY(0.6); }

    /* Nav link underline */
    .tt-nav-link { position: relative; }
    .tt-nav-link::after {
      content: '';
      position: absolute;
      left: 14px; right: 14px; bottom: 4px;
      height: 1px;
      background: currentColor;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .3s cubic-bezier(.2,.7,.3,1);
    }
    .tt-nav-link:hover::after { transform: scaleX(1); }

    /* Reduce motion */
    body.no-motion *,
    body.no-motion *::before,
    body.no-motion *::after {
      animation-duration: 0s !important;
      animation-delay: 0s !important;
      transition-duration: 0s !important;
    }
    body.no-motion [data-reveal] { opacity: 1; transform: none; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0s !important; transition-duration: 0s !important; }
      [data-reveal] { opacity: 1; transform: none; }
    }

    /* ── Mobile ──────────────────────────────────────────────── */
    @media (max-width: 860px) {
      .tt-nav-links { display: none !important; }
      .tt-nav-inner { padding: 12px 20px !important; }
      .tt-container { padding: 0 20px !important; }
      .tt-hero-section { padding: 48px 20px 32px !important; }
      .tt-hero-grid {
        grid-template-columns: 1fr !important;
        gap: 24px !important;
        margin-top: 24px !important;
      }
      .tt-grid-2,
      .tt-grid-3,
      .tt-contact-grid {
        grid-template-columns: 1fr !important;
        gap: 16px !important;
      }
      .tt-post-row {
        grid-template-columns: 1fr !important;
        gap: 6px !important;
        padding: 16px 18px !important;
      }
      .tt-post-row > :nth-child(4) { text-align: left !important; }
      .tt-section-header { gap: 12px !important; margin-bottom: 24px !important; }
      .tt-section-header > :last-child { display: none !important; }
      .tt-kontakt-card { padding: 40px 24px !important; border-radius: 18px !important; }

      /* Career row: date|+ on top, title spans, place below */
      .tt-career-row {
        grid-template-columns: 1fr auto !important;
        grid-template-areas:
          "date plus"
          "title title"
          "place place" !important;
        gap: 6px 12px !important;
        padding: 16px 18px !important;
      }
      .tt-career-row > :nth-child(1) { grid-area: date; }
      .tt-career-row > :nth-child(2) { grid-area: title; }
      .tt-career-row > :nth-child(3) { grid-area: place; text-align: left !important; opacity: 0.7; }
      .tt-career-row > :nth-child(4) { grid-area: plus; }

      /* Mobile scroll nav */
      .tt-mobile-nav-row {
        display: flex !important;
        overflow-x: auto;
        gap: 6px;
        padding: 10px 20px 12px;
        border-top: 1px solid var(--line);
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .tt-mobile-nav-row::-webkit-scrollbar { display: none; }

      /* Stats bar: stack vertically, border bottom instead of right */
      .tt-stats-item { border-right: none !important; border-bottom: 1px solid var(--line) !important; }
      .tt-stats-item:last-child { border-bottom: none !important; }

      /* Hide dark quote card in Notizen on mobile — saves space */
      .tt-notizen-dark-card { display: none !important; }
      .tt-notizen-featured { grid-template-columns: 1fr !important; }

      /* Kontakt: stack */
      .tt-contact-grid { grid-template-columns: 1fr !important; }
    }

    @media (max-width: 520px) {
      .tt-hero-title { letter-spacing: -0.04em !important; }
      .tt-kontakt-card { padding: 32px 20px !important; }
      section { padding-top: 48px !important; padding-bottom: 24px !important; }
      /* Smaller card fonts on tiny screens */
      .tt-card-role { font-size: 18px !important; }
    }

    /* selection color */
    ::selection {
      background: var(--accent);
      color: var(--bg);
    }

    a { color: inherit; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="cv-data.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="web-hero.jsx"></script>
  <script type="text/babel" src="web-sections.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "moss",
      "hero": "mono",
      "grain": true,
      "ticker": true,
      "motion": true
    }/*EDITMODE-END*/;

    function App() {
      const PALETTES = {
        terra: ['#b04a2e', '#efeae0', '#1a1812'],
        moss: ['#3a6b46', '#ece8de', '#1a1812'],
        cobalt: ['#2d4cb8', '#ecedef', '#161821'],
        mono: ['#1a1812', '#f4f1ea', '#6b6256'],
      };
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [activeSection, setActiveSection] = React.useState('jetzt');

      // apply theme to html element
      React.useEffect(() => {
        document.documentElement.setAttribute('data-theme', t.theme);
      }, [t.theme]);

      // apply grain to body
      React.useEffect(() => {
        document.body.classList.toggle('grain', t.grain);
      }, [t.grain]);

      // motion preference
      React.useEffect(() => {
        document.body.classList.toggle('no-motion', !t.motion);
      }, [t.motion]);

      // scroll-progress
      React.useEffect(() => {
        const onScroll = () => {
          const h = document.documentElement;
          const max = h.scrollHeight - h.clientHeight;
          const pct = max > 0 ? (h.scrollTop / max) * 100 : 0;
          const bar = document.getElementById('tt-progress');
          if (bar) bar.style.width = pct + '%';
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      // reveal-on-scroll observer (re-binds when hero variant changes)
      React.useEffect(() => {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.setAttribute('data-revealed', 'true');
              observer.unobserve(e.target);
            }
          });
        }, { rootMargin: '-8% 0px -10% 0px', threshold: 0.05 });
        const id = requestAnimationFrame(() => {
          document.querySelectorAll('[data-reveal]').forEach(el => observer.observe(el));
        });
        return () => { cancelAnimationFrame(id); observer.disconnect(); };
      }, [t.hero]);

      // observe sections for active nav state
      React.useEffect(() => {
        const ids = ['jetzt', 'arbeit', 'karriere', 'methoden', 'notizen', 'kontakt'];
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) setActiveSection(e.target.id);
          });
        }, { rootMargin: '-30% 0px -60% 0px' });
        ids.forEach(id => {
          const el = document.getElementById(id);
          if (el) observer.observe(el);
        });
        return () => observer.disconnect();
      }, []);

      const { StatusTicker, NavBar, HeroEditorial, HeroGrotesk, HeroMono } = window.WebHero;
      const { Jetzt, Arbeit, Karriere, Notizen, Kontakt, Footer } = window.WebSections;

      const HeroComponent = { editorial: HeroEditorial, grotesk: HeroGrotesk, mono: HeroMono }[t.hero] || HeroEditorial;

      return (
        <>
          <div id="tt-progress" className="tt-progress"></div>
          {t.ticker && <StatusTicker />}
          <NavBar activeSection={activeSection} />
          <HeroComponent key={t.hero} />
          <Jetzt />
          <Arbeit />
          <Karriere />
          <Notizen />
          <Kontakt />
          <Footer />

          <TweaksPanel>
            <TweakSection label="Hero" />
            <TweakRadio label="Stil" value={t.hero}
              options={['editorial', 'grotesk', 'mono']}
              onChange={(v) => setTweak('hero', v)} />

            <TweakSection label="Theme" />
            <TweakColor label="Palette" value={PALETTES[t.theme]}
              options={Object.values(PALETTES)}
              onChange={(v) => {
                const name = Object.keys(PALETTES).find(k => PALETTES[k][0].toLowerCase() === v[0].toLowerCase());
                setTweak('theme', name || 'terra');
              }} />

            <TweakSection label="Details" />
            <TweakToggle label="Animationen" value={t.motion}
              onChange={(v) => setTweak('motion', v)} />
            <TweakToggle label="Papierkorn" value={t.grain}
              onChange={(v) => setTweak('grain', v)} />
            <TweakToggle label="Status-Ticker" value={t.ticker}
              onChange={(v) => setTweak('ticker', v)} />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
