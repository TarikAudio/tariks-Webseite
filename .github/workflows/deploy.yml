name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        run: |
          lftp -c "
          set ftp:ssl-allow no;
          set net:timeout 30;
          open -u u178379137.tariksgit,${{ secrets.FTP_PASSWORD }} 46.202.156.154;
          mirror -R --delete --verbose \
            --exclude-glob .git \
            --exclude-glob .github \
            --exclude-glob hostinger-upload \
            --exclude-glob '*.docx' \
            --exclude-glob .DS_Store \
            . /;
          bye
          "
